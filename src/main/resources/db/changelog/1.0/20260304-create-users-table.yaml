databaseChangeLog:
  - changeSet:
      id: create-user-table
      author: isa
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: firstname
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: lastname
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false