databaseChangeLog:
  - changeSet:
      id: 0
      author: isameddin
      changes:
        - createTable:
            tableName: persons
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true